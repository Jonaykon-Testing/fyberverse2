name: Mirror artifyber.xyz

on:
    schedule:
        - cron: "0 * * * *" # Run every hour
    workflow_dispatch:

permissions:
    contents: write

jobs:
    mirror:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  ref: artifyber.xyz

            - name: Clean old files
              run: rm -rf *

            - name: Mirror site
              run: |
                  wget \
                      --mirror \
                      --convert-links \
                      --adjust-extension \
                      --page-requisites \
                      --no-parent \
                      -nH \
                      https://artifyber.xyz

            - name: Commit changes with version
              run: |
                  git config user.name "github-actions"
                  git config user.email "actions@github.com"

                  VERSION=$(grep -Eo 'version[[:space:]]*[:=][[:space:]]*["'"'"'][^"'"'"']+["'"'"']' data.js | sed -E 's/.*["'"'"']([^"'"'"']+)["'"'"'].*/\1/' || echo "unknown")

                  git add .
                  git diff --cached --quiet && exit 0
                  git commit -m "Update to v$VERSION"
                  git push origin HEAD:artifyber.xyz
